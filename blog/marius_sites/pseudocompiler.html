<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pseudocompiler</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5; /* White smoke background */
      color: #228B22; /* Forest green for text */
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      justify-content: space-between;
      overflow: hidden; /* Prevent scrolling */
    }
    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 20px;
      background-color: #007BFF; /* Blue navbar */
    }
    .navbar img {
      height: 40px; /* Adjust logo size */
    }
    .navbar button {
      background-color: #FFD700; /* Yellow buttons */
      color: #000000; /* Black text for buttons */
      border: none;
      border-radius: 5px;
      padding: 8px 16px;
      font-size: 1em;
      cursor: pointer;
    }
    .navbar button:hover {
      background-color: #FFC300; /* Darker yellow on hover */
    }
    /* Main Content */
    .content {
      text-align: center;
      color: #228B22; /* Forest green text */
      width: 100%;
      max-width: 800px; /* Max width for the content */
      overflow: hidden; /* Prevent horizontal scrolling */
    }
    .editor-container {
      display: flex;
      justify-content: center; /* Center the editor area */
      width: 100%;
      margin: 20px 0; /* Space above and below the editor */
      flex-wrap: wrap; /* Allow items to wrap in smaller screens */
    }
    .editor {
      display: flex;
      width: calc(45% - 2%); /* Fixed width for input and output minus margins */
      margin: 0 1%; /* 2% margin left and right */
      background-color: #ffffff; /* White background for code area */
      border: 1px solid #228B22;
      border-radius: 5px;
    }
    .line-numbers {
      padding: 10px;
      background-color: #f0f0f0; /* Light gray for line numbers */
      border-right: 1px solid #228B22;
      text-align: right;
      color: #aaa;
      user-select: none; /* Prevent text selection */
      min-width: 30px; /* Fixed width for line numbers */
      font-size: 0.8em; /* Smaller font for line numbers */
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border: none;
      background-color: #ffffff; /* White background for textareas */
      color: #228B22; /* Forest green for text */
      resize: none;
      font-family: monospace; /* Code-like font */
      outline: none; /* Remove default outline */
    }
    input[type=button] {
      background-color: #228B22; /* Forest green for button */
      color: #ffffff; /* White text for button */
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
      margin: 20px 0; /* Space above and below the button */
    }
    input[type=button]:hover {
      background-color: #1a6e1a; /* Darker green on hover */
    }
    /* Footer */
    .footer {
      background-color: #f5f5f5; /* White smoke background */
      color: #228B22; /* Forest green text */
      width: 100%;
      text-align: center;
      padding: 20px;
    }
    .footer p, .footer a {
      margin: 5px 0;
      color: #228B22; /* Forest green for footer links */
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .footer .social-links a {
      margin: 0 10px;
      color: #228B22; /* Forest green for social links */
      font-size: 1.2em;
    }
    /* Responsive */
    @media (max-width: 600px) {
      .editor {
        width: 99%; /* Full width for smaller screens */
        margin: 10px 0; /* Space between stacked textareas */
      }
      input[type=button] {
        width: 99%; /* Full width for the button on smaller screens */
      }
      .navbar, .footer {
        width: 99%; /* Full width for navbar and footer on smaller screens */
        padding: 10px; /* Adjust padding for consistency */
      }
    }
  </style>
  <script>
    function pseudo() {
      const input = document.getElementById('pseudoinput').value;
      const output = document.getElementById('pseudooutput');
      output.value = "Compiling...\n" + input;
      output.style.height = document.getElementById('pseudoinput').style.height;
    }

    function updateLineNumbers() {
      const textarea = document.getElementById('pseudoinput');
      const lineNumbers = document.getElementById('line-numbers');
      const lines = textarea.value.split('\n').length;
      lineNumbers.innerHTML = Array.from({ length: lines }, (_, i) => i + 1).join('<br>');
    }
  </script>
</head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <img src="path/to/logo.png" alt="Logo"> <!-- Replace with your logo -->
    <button onclick="location.href='#'">Learn</button>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>pseudocompiler (pseudocompilator)</h1>
    <p>Compilator pseudocod</p>
    <div class="editor-container">
      <div class="editor">
        <div id="line-numbers" class="line-numbers">1</div>
        <textarea id="pseudoinput" placeholder="Enter pseudocode here..." oninput="updateLineNumbers(); document.getElementById('pseudooutput').style.height = this.scrollHeight + 'px';"></textarea>
      </div>
      <div class="editor">
        <textarea id="pseudooutput" placeholder="Output will appear here..." readonly></textarea>
      </div>
    </div>
    <input type="button" id="pseudocompile" onclick="pseudo();" value="compile">
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>&copy; 2024 Nume. All Rights Reserved.</p>
    <div>
      <a href="#">Privacy Policy</a> | 
      <a href="#">Terms of Service</a>
    </div>
    <div class="social-links">
      <a href="#">Facebook</a>
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
    </div>
  </div>
</body>
</html>
